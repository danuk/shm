name: 'Telegram Release Notification'

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Тег релиза'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Название релиза'
        required: true
        default: 'Релиз v1.0.0'
      body:
        description: 'Описание релиза (changelog)'
        required: true
        default: |
          ## Что изменилось
          * Новая функция 1
          * Новая функция 2
          * Исправления ошибок

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    # Запускать только если workflow_run завершился успешно или это ручной запуск
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Получение репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - name: Проверка условий для уведомления
        id: check_conditions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_notify=true" >> $GITHUB_OUTPUT
            echo "is_manual=true" >> $GITHUB_OUTPUT
            echo "✅ Ручной запуск - отправим уведомление"
          else
            # Проверяем, что тег был создан из release ветки
            # Получаем последний тег
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -z "$TAG_NAME" ]; then
              echo "should_notify=false" >> $GITHUB_OUTPUT
              echo "is_manual=false" >> $GITHUB_OUTPUT
              echo "⏭️ Тег не найден - пропускаем уведомление"
              exit 0
            fi

            # Проверяем, с какой ветки был создан этот тег
            BRANCHES=$(git branch -r --contains "tags/${TAG_NAME}" | grep -v HEAD | sed 's/.*origin\///' | tr -d ' ')

            echo "Тег ${TAG_NAME} содержится в ветках: ${BRANCHES}"

            if echo "$BRANCHES" | grep -q "^release$"; then
              echo "should_notify=true" >> $GITHUB_OUTPUT
              echo "is_manual=false" >> $GITHUB_OUTPUT
              echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
              echo "✅ Тег ${TAG_NAME} создан из release ветки - отправим уведомление"
            else
              echo "should_notify=false" >> $GITHUB_OUTPUT
              echo "is_manual=false" >> $GITHUB_OUTPUT
              echo "⏭️ Тег ${TAG_NAME} НЕ из release ветки (${BRANCHES}) - пропускаем уведомление"
            fi
          fi

      - name: Получение информации о релизе
        id: release_info
        if: steps.check_conditions.outputs.should_notify == 'true'
        run: |
          if [ "${{ steps.check_conditions.outputs.is_manual }}" = "true" ]; then
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            BODY=$(echo '${{ github.event.inputs.body }}' | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
            echo "body=$BODY" >> $GITHUB_OUTPUT
          else
            # Получаем тег из предыдущего шага или напрямую
            TAG_NAME="${{ steps.check_conditions.outputs.tag_name }}"
            if [ -z "$TAG_NAME" ]; then
              TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
            fi
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "name=Release $TAG_NAME" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "body=Автоматический релиз из release ветки" >> $GITHUB_OUTPUT
          fi

      - name: Форматирование сообщения для Telegram
        id: format_message
        if: steps.check_conditions.outputs.should_notify == 'true'
        run: |
          TAG_NAME="${{ steps.release_info.outputs.tag_name }}"
          RELEASE_NAME="${{ steps.release_info.outputs.name }}"
          PRERELEASE="${{ steps.release_info.outputs.prerelease }}"
          BODY="${{ steps.release_info.outputs.body }}"
          REPO_NAME="${{ github.repository }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          # Определение типа релиза и эмодзи
          if [ "$PRERELEASE" = "true" ]; then
            EMOJI="🧪"
            RELEASE_TYPE="Пред-релиз"
          else
            EMOJI="🚀"
            RELEASE_TYPE="Релиз"
          fi

          # Получение коммитов для релиза
          echo "Получение списка коммитов..."

          # Получаем предыдущий тег
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            # Получаем коммиты между предыдущим и текущим тегом
            COMMITS=$(git log --pretty=format:"• %s" ${PREVIOUS_TAG}..HEAD 2>/dev/null || echo "")
          else
            # Если предыдущего тега нет, получаем все коммиты
            COMMITS=$(git log --pretty=format:"• %s" HEAD 2>/dev/null || echo "")
          fi

          # Ограничиваем количество коммитов (последние 100)
          if [ -n "$COMMITS" ]; then
            # Исключаем строки, начинающиеся на 'Merge pull request'
            COMMITS=$(echo "$COMMITS" | grep -v '^• Merge pull request')
            COMMITS=$(echo "$COMMITS" | head -100)
            COMMITS_SECTION="$COMMITS"
          else
            COMMITS_SECTION="Нет изменений в коде"
          fi

          # Форматирование сообщения (используем plain text без Markdown)
          printf '%s\n\n%s\n\n%s\n%s\n\n%s' \
            "${EMOJI} ${RELEASE_TYPE} ${TAG_NAME}" \
            "📦 Репозиторий: ${REPO_NAME}" \
            "📋 Changelog:" \
            "${COMMITS_SECTION}" \
            "🔗 Посмотреть релиз: ${REPO_URL}/releases/tag/${TAG_NAME}" \
            > /tmp/telegram_message.txt

          # Сохраняем путь к файлу сообщения
          echo "message_file=/tmp/telegram_message.txt" >> $GITHUB_OUTPUT

      - name: Отправка в Telegram
        if: steps.check_conditions.outputs.should_notify == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ Секрет TELEGRAM_BOT_TOKEN не найден"
            echo "Пожалуйста, добавьте токен Telegram бота в секреты репозитория"
            exit 1
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ Секрет TELEGRAM_CHAT_ID не найден"
            echo "Пожалуйста, добавьте ID чата/канала Telegram в секреты репозитория"
            exit 1
          fi

          MESSAGE_FILE="${{ steps.format_message.outputs.message_file }}"

          # Создаем JSON payload с помощью jq для правильного экранирования
          PAYLOAD=$(jq -n \
            --arg chat_id "${TELEGRAM_CHAT_ID}" \
            --arg thread_id "${TELEGRAM_THREAD_ID}" \
            --rawfile text "$MESSAGE_FILE" \
            '{
              chat_id: $chat_id,
              message_thread_id: ($thread_id // null),
              text: $text,
              disable_notification: true,
              disable_web_page_preview: true
            }')

          # Отправка сообщения в Telegram
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Проверка успешной отправки сообщения
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Уведомление о релизе успешно отправлено в Telegram!"
            echo "Ответ: $RESPONSE"
          else
            echo "❌ Не удалось отправить сообщение в Telegram"
            echo "Ответ: $RESPONSE"
            exit 1
          fi

      - name: Тестовое сообщение (только при ручном запуске)
        if: steps.check_conditions.outputs.is_manual == 'true'
        run: |
          echo "🧪 Это был тестовый запуск, выполненный вручную"
          echo "В продакшене этот workflow будет запускаться автоматически после сборки релиза из release ветки"

      - name: Информация о пропуске
        if: steps.check_conditions.outputs.should_notify == 'false'
        run: |
          echo "⏭️ Уведомление пропущено - релиз не из release ветки"
          echo "Уведомления отправляются только для релизов из release ветки (тегов без суффиксов)"
